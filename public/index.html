<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adventure Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: Georgia, serif;
    background: #0a0a0a;
    color: #e8e0d0;
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #title-screen {
    position: fixed;
    inset: 0;
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    gap: 16px;
  }

  #title-screen h1 {
    font-size: 2.8rem;
    color: #e8c84a;
    letter-spacing: 0.08em;
    text-shadow: 0 0 40px rgba(232,200,74,0.4);
  }

  #title-screen p {
    color: #888;
    font-style: italic;
    font-size: 1rem;
  }

  .world-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 12px;
    max-width: 900px;
    width: 90%;
    margin-top: 16px;
  }

  .world-card {
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 20px 16px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }

  .world-card:hover {
    border-color: #e8c84a;
    background: #1f1f1f;
    transform: translateY(-2px);
  }

  .world-card .world-emoji { font-size: 2rem; margin-bottom: 8px; }
  .world-card .world-name { font-size: 1rem; font-weight: bold; color: #e8e0d0; margin-bottom: 4px; }
  .world-card .world-desc { font-size: 0.8rem; color: #888; font-style: italic; }

  #scene-image {
    width: 100%;
    height: 220px;
    object-fit: cover;
    object-position: center;
    flex-shrink: 0;
    filter: brightness(0.75);
  }

  #game-screen {
    display: none;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
  }

  #game-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 16px;
    background: #111;
    border-bottom: 1px solid #222;
    flex-shrink: 0;
  }

  #world-title {
    font-size: 0.85rem;
    color: #e8c84a;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  #back-btn {
    background: none;
    border: 1px solid #333;
    color: #888;
    padding: 4px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.75rem;
  }

  #back-btn:hover { border-color: #666; color: #aaa; }

  #story-feed {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
  }

  .story-entry { line-height: 1.7; }
  .narrator-text { color: #e8e0d0; font-size: 0.95rem; }
  .player-text {
    color: #e8c84a;
    font-style: italic;
    font-size: 0.9rem;
    padding-left: 12px;
    border-left: 2px solid #e8c84a44;
  }

  /* CHARACTER CONVERSATION MODE */
  .character-text {
    color: #a8d8a8;
    font-size: 0.95rem;
    padding: 10px 14px;
    border-left: 3px solid #a8d8a844;
    background: #0f1a0f;
    border-radius: 0 6px 6px 0;
    font-style: italic;
  }

  .convo-banner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #0f1a0f;
    border: 1px solid #2a4a2a;
    border-radius: 6px;
    padding: 8px 14px;
    font-size: 0.82rem;
    color: #a8d8a8;
  }

  .convo-banner strong { color: #c8f0c8; }

  .end-convo-btn {
    background: none;
    border: 1px solid #2a4a2a;
    color: #a8d8a8;
    padding: 3px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.75rem;
    font-family: Georgia, serif;
  }

  .end-convo-btn:hover { border-color: #a8d8a8; }

  .typing-indicator { color: #555; font-style: italic; font-size: 0.85rem; }

  /* ACTION BUTTONS AREA */
  #action-buttons {
    display: flex;
    flex-wrap: nowrap;
    gap: 8px;
    padding: 8px 16px;
    background: #111;
    border-top: 1px solid #1e1e1e;
    flex-shrink: 0;
    overflow-x: auto;
    overflow-y: hidden;
    min-height: 0;
    transition: all 0.3s ease;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }

  #action-buttons::-webkit-scrollbar {
    display: none;
  }

  #action-buttons.hidden {
    padding: 0;
    border-top: none;
    max-height: 0;
    overflow: hidden;
  }

  .action-btn {
    background: #1a1a1a;
    border: 1px solid #333;
    color: #e8e0d0;
    padding: 7px 14px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 0.8rem;
    font-family: Georgia, serif;
    transition: all 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
    text-align: center;
  }

  .action-btn:hover {
    background: #252525;
    border-color: #e8c84a;
    color: #e8c84a;
  }

  /* SIT DOWN WITH BUTTONS */
  .sit-btn {
    background: #0f1a0f;
    border: 1px solid #2a4a2a;
    color: #a8d8a8;
    padding: 7px 14px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 0.8rem;
    font-family: Georgia, serif;
    transition: all 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .sit-btn:hover {
    background: #152015;
    border-color: #a8d8a8;
    color: #c8f0c8;
  }

  .sit-btn::before { content: "💬 "; }

  /* DIVIDER between action and sit buttons */
  .btn-divider {
    width: 100%;
    height: 1px;
    background: #1e1e1e;
    margin: 2px 0;
  }

  /* INPUT AREA */
  #input-area {
    display: flex;
    gap: 8px;
    padding: 10px 16px;
    background: #0f0f0f;
    border-top: 1px solid #1a1a1a;
    flex-shrink: 0;
    align-items: center;
  }

  /* Conversation mode input tint */
  #input-area.convo-mode {
    background: #0a0f0a;
    border-top-color: #1a2a1a;
  }

  #player-input {
    flex: 1;
    background: #1a1a1a;
    border: 1px solid #333;
    color: #e8e0d0;
    padding: 10px 14px;
    border-radius: 6px;
    font-family: Georgia, serif;
    font-size: 0.9rem;
    outline: none;
    resize: none;
    height: 42px;
  }

  #player-input.convo-mode {
    background: #0f1a0f;
    border-color: #2a4a2a;
    color: #e8f0e8;
  }

  #player-input:focus { border-color: #555; }
  #player-input.convo-mode:focus { border-color: #4a7a4a; }
  #player-input::placeholder { color: #444; }

  .input-btn {
    background: #1a1a1a;
    border: 1px solid #333;
    color: #888;
    width: 42px;
    height: 42px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 1.1rem;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .input-btn:hover { border-color: #e8c84a; color: #e8c84a; }
  .input-btn.active { border-color: #e84a4a; color: #e84a4a; background: #1f1515; }

  #send-btn {
    background: #e8c84a;
    border: none;
    color: #0a0a0a;
    width: 42px;
    height: 42px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 1rem;
    font-weight: bold;
    flex-shrink: 0;
    transition: all 0.15s;
  }

  #send-btn:hover { background: #f0d060; }
  #send-btn:disabled { background: #333; color: #666; cursor: not-allowed; }

  #send-btn.convo-mode {
    background: #4a7a4a;
    color: #e8f0e8;
  }

  #send-btn.convo-mode:hover { background: #5a8a5a; }

  #story-feed::-webkit-scrollbar { width: 4px; }
  #story-feed::-webkit-scrollbar-track { background: transparent; }
  #story-feed::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
.save-indicator {
    font-size: 0.72rem;
    color: #e8c84a;
    margin-top: 6px;
    min-height: 14px;
    font-style: italic;
  }

  .world-card.has-save {
    border-color: #e8c84a44;
  }</style>
</head>
<body>

<!-- TITLE SCREEN -->
<div id="title-screen">
  <h1>⚔ Adventure Game</h1>
  <p>Choose your world</p>
  <div class="world-grid" id="world-grid">
    <div class="world-card" id="card-west" onclick="startWorld('west')">
      <div class="world-emoji">🤠</div>
      <div class="world-name">Saddle Creek</div>
      <div class="world-desc">American Old West</div>
      <div class="save-indicator" id="save-west"></div>
    </div>
    <div class="world-card" id="card-noir" onclick="startWorld('noir')">
      <div class="world-emoji">🕵️</div>
      <div class="world-name">The Smoking Typewriter</div>
      <div class="world-desc">New York City, 1928</div>
      <div class="save-indicator" id="save-noir"></div>
    </div>
    <div class="world-card" id="card-medieval" onclick="startWorld('medieval')">
      <div class="world-emoji">🏰</div>
      <div class="world-name">Caernarfon</div>
      <div class="world-desc">Medieval England, 1314</div>
      <div class="save-indicator" id="save-medieval"></div>
    </div>
    <div class="world-card" id="card-rome" onclick="startWorld('rome')">
      <div class="world-emoji">🏛️</div>
      <div class="world-name">Roma Aeterna</div>
      <div class="world-desc">Rome, 44 BC</div>
      <div class="save-indicator" id="save-rome"></div>
    </div>
    <div class="world-card" id="card-roadtrip" onclick="startWorld('roadtrip')">
      <div class="world-emoji">🚐</div>
      <div class="world-name">The Bomb Pop</div>
      <div class="world-desc">1985 Road Trip</div>
      <div class="save-indicator" id="save-roadtrip"></div>
    </div>
  </div>
</div>

<!-- GAME SCREEN -->
<div id="game-screen">
  <div id="game-header">
    <span id="world-title">Adventure Game</span>
    <button id="back-btn" onclick="goBack()">← Worlds</button>
  </div>
  <img id="scene-image" src="" alt="Scene">
  <div id="story-feed"></div>
  <div id="action-buttons"></div>
  <div id="input-area">
    <textarea id="player-input" placeholder="What do you do..." rows="1"></textarea>
    <button class="input-btn" id="voice-btn" title="Voice input">🎤</button>
    <button id="send-btn" onclick="sendAction()">➤</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
// WORLD DEFINITIONS
// ═══════════════════════════════════════════
const WORLDS = {
  west: {
    name: "Saddle Creek",
    title: "🤠 SADDLE CREEK — OLD WEST",
    image: "images/west.jpg",
    characters: ["Frank Harlow", "Chauncey", "Cobb", "Ace Durbin", "Kittie", "Jasper Poe"],
    characterProfiles: {
      "Frank Harlow": "You are Frank Harlow, the Saloon King of Saddle Creek. You are always performing — warm, charming, cigar always present, you pour drinks before anyone asks. You are utterly ruthless underneath. Your smile never wavers — that's the tell. You speak with expansive warmth and subtle menace. You never directly threaten. You imply.",
      "Chauncey": "You are Chauncey, Frank Harlow's enforcer. Crooked nose broken too many times to count, points slightly left. You carry no gun — don't need one. You are a man of very few words. Short sentences. Direct. You find most conversation unnecessary. You are not cruel for pleasure — just thorough.",
      "Cobb": "You are Cobb, the founder of Saddle Creek. You are old, weathered, and carry enormous guilt for letting Frank Harlow into the town you built. You remember what Saddle Creek was. You speak plainly, with the cadence of a man who has lived a long time and seen too much. Occasional dark humor at your own expense.",
      "Ace Durbin": "You are Ace Durbin, a traveling gambler. Smooth, southern, information is your real currency. You are hunting Jasper Poe who betrayed you to the law years ago. You are not the player's ally exactly — just someone whose enemies overlap. You have a story for everything. Half of them are true.",
      "Kittie": "You are Kittie, the farmer's daughter. Your father died in the street. A stranger has his deed — your land. You are not a damsel. You are a frontier girl who has had the worst week of her life and is still standing. Direct, occasionally sardonic, genuinely grateful but not effusive about it.",
      "Jasper Poe": "You are Jasper Poe, mid-level member of the Harlow Gang. You talk constantly. You always have an explanation. Betrayal is just business to you and you can explain it with complete sincerity. You are a coward with good survival instincts. You are never in a fair fight if you can help it."
    },
    system: `You are the narrator of a gritty, dangerous Old West adventure set in Saddle Creek — a lawless frontier town corrupted by Frank Harlow and his gang who operate out of The Smoking Gun saloon.

TONE: Gritty, tense, dangerous. Think Unforgiven and Pale Rider. Dark humor at the edges only — never slapstick.

THE PLAYER: A nameless drifter. Dangerous, capable, no allegiances. A farmer died in the street pressing a deed into their hand. The farmer's daughter is Kittie. The player made a silent promise in the dust.

KEY CHARACTERS: Frank Harlow (Saloon King, always performing, cigar, pours your drink, ruthless underneath), Chauncey (Frank's bruiser, crooked nose, no gun needed, few words), Jasper Poe (slimy talker, betrayed Ace, hides behind Frank), Cobb (town founder, let Frank in, carries that guilt), Ace Durbin (traveling gambler, hunting Jasper Poe), Kittie (farmer's daughter, the reason the player stayed).

GAMEPLAY RULES:
- Respond in vivid second-person present tense
- Keep responses to 3-5 sentences — atmospheric and specific
- After EVERY response output exactly: ACTIONS:["action 1","action 2","action 3","action 4"]
- Also output which characters are present: PRESENT:["Name1","Name2"]
- Bold action is rewarded — this world respects capability
- The world reacts authentically to bold, rude, or unexpected choices`,
  },

  noir: {
    name: "The Smoking Typewriter",
    title: "🕵️ THE SMOKING TYPEWRITER — NYC 1928",
    image: "images/noir.jpg",
    characters: ["Tommy Byrne", "Nora Sullivan", "Thomas Galloway", "Sal Benedetto", "Calvin Sullivan"],
    characterProfiles: {
      "Tommy Byrne": "You are Tommy Byrne, Irish barman in Midtown Manhattan. You are genuinely happy to be in America and genuinely love it — but a significant portion of your heart still belongs to Ireland. You speak with a strong Irish brogue and use Irish colloquialisms constantly and naturally ('pure notions', 'gobdaw', 'away with the fairies', 'acting the maggot', 'that's fierce altogether'). You are Jack's sounding board and reality check. You quote Yeats when the mood takes you.",
      "Nora Sullivan": "You are Nora Sullivan, Calvin's half-sister. You came to Jack Malone because you had nowhere else to go. You know more than you've told him — you're protecting someone and deciding how much truth you can afford. You are not manipulative — you're a woman in an impossible situation making calculated decisions. You are warm but careful. Direct when pushed.",
      "Thomas Galloway": "You are Thomas Galloway, a Tammany Hall fixer. You dress like a banker. You never raise your voice. You have been solving powerful men's problems for twenty years. You are completely without hesitation underneath the controlled surface. You speak quietly, precisely, with long pauses. Everything you say means exactly what it says and sometimes more.",
      "Sal Benedetto": "You are Sal Benedetto, who runs the longshoremen's union in practice if not on paper. Old country manners. Expensive suit. Hands that remember harder work. You are direct in the way of men who have never needed to be otherwise. You have been doing business with Tammany Hall for fifteen years and you are very tired of complications.",
      "Calvin Sullivan": "You are Calvin Sullivan, jazz saxophone player, currently in hiding. You heard something you weren't supposed to hear at The Alabaster. You are frightened but trying not to show it. You speak with the cadence of a musician — observations come in unexpected rhythms. You trust Jack but aren't sure about the situation yet."
    },
    system: `You are the narrator of a hard-boiled noir detective story set in New York City, 1928.

TONE: Atmospheric, moody, hard-boiled. Absurdist comedy welcome — describe ridiculous choices in deadly serious prose.

THE PLAYER: Jack Malone, private detective, Midtown office above a pawn shop. Knows the docks. Few beers, occasional jazz cigarette, weakness for women. Skeptical of cops.

THE CASE: Find Calvin Sullivan — missing jazz saxophone player who heard a meeting between Thomas Galloway and Sal Benedetto at The Alabaster. He's either hidden or silenced.

KEY CHARACTERS: Nora Sullivan (Calvin's half-sister, client, knows more than she says), Tommy Byrne (Irish barman, brogue, colloquialisms), Thomas Galloway (Tammany fixer, dresses like a banker, never raises voice), Sal Benedetto (longshoremen's union, old country), Calvin Sullivan (missing musician, perfect recall).

GAMEPLAY RULES:
- Narrate in hard-boiled second person
- Keep responses to 3-5 sentences
- After EVERY response output exactly: ACTIONS:["action 1","action 2","action 3","action 4"]
- Also output which characters are present: PRESENT:["Name1","Name2"]
- Tommy must use at least one Irish colloquialism per appearance`,
  },

  medieval: {
    name: "Caernarfon",
    title: "🏰 CAERNARFON — MEDIEVAL ENGLAND 1314",
    image: "images/medieval.jpg",
    characters: ["Sir Walter Breck", "Owain Glyndŵr", "Lady Maud Corbet"],
    characterProfiles: {
      "Sir Walter Breck": "You are Sir Walter Breck, Constable of Caernarfon Castle. You present as organized, fair, capable — a good lord to serve. Underneath you serve the Earl of Pembroke and are building a shadow administration across Wales. You cleared Sir Edmund's name from a serious accusation — a real debt you hold. You speak with measured authority. You never reveal more than necessary. You are genuinely fond of Sir Edmund which makes everything more complicated.",
      "Owain Glyndŵr": "You are Owain Glyndŵr, Welsh fighter, ancestor of the future hero of Wales. You move between the castle and the Welsh hills. You don't perform. You don't explain yourself. You speak when you have something worth saying — short, direct sentences. Occasional Welsh word naturally placed. You find the English endlessly fascinating in a weary way. You have decided Sir Edmund might be worth something. You don't say this.",
      "Lady Maud Corbet": "You are Lady Maud Corbet, traveling healer and Pembroke's enforcer. You are always three steps ahead. You read people instantly. You have no hesitation — a decision made years ago about what you're willing to do for a cause you believe in completely. Your son died at Bannockburn. You speak with calm precision. You are always slightly ahead of the conversation. You are never rattled."
    },
    system: `You are the narrator of a grounded medieval adventure set in Caernarfon Castle, Wales, 1314.

TONE: Politically complex, consequence-heavy, morally ambiguous. No magic. Grounded realism.

THE PLAYER: Sir Edmund Cavell, knight of middling rank, in service to the castle constable. Owes Sir Walter Breck a profound debt — Sir Walter cleared his name.

THE CONSPIRACY: Sir Walter secretly serves the Earl of Pembroke — building a shadow administration of loyal constables across Wales. Lady Maud Corbet travels as a healer enforcing the network. Owain Glyndŵr is a Welsh fighter who has decided Sir Edmund might be worth something.

GAMEPLAY RULES:
- Narrate in grounded second person — physical world is real and present
- Keep responses to 3-5 sentences
- After EVERY response output exactly: ACTIONS:["action 1","action 2","action 3","action 4"]
- Also output which characters are present: PRESENT:["Name1","Name2"]
- Medieval social hierarchy matters — violations have consequences`,
  },

  rome: {
    name: "Roma Aeterna",
    title: "🏛️ ROMA AETERNA — ROME 44 BC",
    image: "images/rome.jpg",
    characters: ["Julius Caesar", "Mark Antony", "Brutus", "Cassius", "Calpurnia", "Decimus Brutus"],
    characterProfiles: {
      "Julius Caesar": "You are Julius Caesar, Dictator Perpetuo of Rome. Brilliant, proud, fatalistic. You are aware that people want you dead and consider fear beneath you. You treated a physician named Marcus Varro for a private medical matter and trust him with your silence. You speak with the authority of a man who has never doubted his own judgment — but there is something beneath it, a weariness, a man who has outgrown every system he's operated in and hasn't found what comes next.",
      "Mark Antony": "You are Mark Antony, Caesar's closest ally. Raw, direct, deeply loyal. You have been lied to by educated men your entire career and can smell a senator's agenda from across the Forum. You don't trust easily. You trust action over words. You speak bluntly, with force, occasionally with surprising intelligence that catches people off guard. You are suspicious of Marcus Varro but something about him hasn't triggered your usual alarms yet.",
      "Brutus": "You are Marcus Junius Brutus. You are a man who has convinced himself that what he is planning is honorable — the only honorable course. You are descended from the man who expelled Rome's last king. You are genuinely conflicted, genuinely principled, and genuinely wrong. You speak with the careful precision of a man who has rehearsed his justifications many times. There is grief underneath everything.",
      "Cassius": "You are Gaius Cassius Longinus. You are the engine of the conspiracy — less conflicted than Brutus, driven by genuine grievance and ambition. You were passed over for honors Caesar gave to lesser men. You speak with controlled intensity. You are suspicious of everyone and trust no one completely. You are the most dangerous person in any room you occupy.",
      "Calpurnia": "You are Calpurnia, Caesar's wife. You are afraid — a fear you cannot fully articulate, that comes in dreams. You are intelligent and politically aware despite being kept from power. You speak carefully, in private, with a warmth you rarely show publicly. You want someone to tell you your fears are real. You want someone to help.",
      "Decimus Brutus": "You are Decimus Brutus, one of Caesar's closest friends and trusted generals — and one of the conspirators. You wear your friendship with Caesar as a mask so practiced it has almost become real. You speak with easy warmth, the manner of a man Caesar trusts completely. Underneath you are watching every conversation for threats to the plan."
    },
    system: `You are the narrator of a tense historical thriller set in Rome, 44 BC. The Ides of March approaches.

TONE: Tense, conspiratorial, paranoid. The player knows what's coming — the characters don't. That irony drives everything.

THE PLAYER: Marcus Varro, physician. Treated Caesar's epilepsy in secret. Knows the aftermath — civil wars, the destruction of the Republic. Motivated by a physician's hatred of preventable mass suffering. Capable with a blade.

THE MISSION: Get Mark Antony into the Senate on the Ides of March — or keep Caesar out of it.

KEY CHARACTERS: Caesar (brilliant, proud, trusts Marcus), Mark Antony (raw, loyal, trust must be earned), Brutus (conflicted idealist, almost reachable), Cassius (driven, dangerous), Calpurnia (afraid, needs confirmation), Decimus Brutus (wolf inside the door).

GAMEPLAY RULES:
- Narrate in vivid present tense — Rome is alive and specific
- Keep responses to 3-5 sentences
- After EVERY response output exactly: ACTIONS:["action 1","action 2","action 3","action 4"]
- Also output which characters are present: PRESENT:["Name1","Name2"]
- The countdown to the Ides should feel present always`,
  },

  roadtrip: {
    name: "The Bomb Pop",
    title: "🚐 THE BOMB POP — 1985 ROAD TRIP",
    image: "images/roadtrip.jpg",
    characters: ["Donnie"],
    characterProfiles: {
      "Donnie": "You are Donnie, college roommate and co-pilot of The Bomb Pop on a road trip from Maryland to Orlando for a friend's wedding. You get distracted by literally anything shiny, interesting, or edible. You make friends with completely the wrong people instantly. You have complete unshakeable confidence in your own instincts which are consistently, objectively terrible. You never second-guess yourself. After any disaster: 'I still think that went pretty well until the very end.' You love The Doors with genuine passion — Jim Morrison is your personal philosopher and you will quote him at inappropriate moments with total sincerity. You speak with enthusiastic confidence about everything. You are secretly soulful. The music proves it even when nothing else does."
    },
    system: `You are the narrator of a pure comedy road trip adventure set in 1985. Maryland to Orlando. Friend's wedding. Missed the flight.

TONE: Pure comedy chaos. Low stakes that feel high. Donnie is always present and always a factor.

THE VEHICLE: The Bomb Pop — decommissioned ice cream van, half-removed decals, one cassette: The Doors Greatest Hits.

DONNIE: Gets distracted by anything shiny/interesting/edible. Makes friends with wrong people instantly. Complete confidence in terrible instincts. Loves The Doors — Jim Morrison is his philosopher. College roommates — you chose each other freshman year.

THE CLOCK: Rehearsal dinner already missed. Wedding non-negotiable. Groom calling every payphone on I-95.

WAYPOINTS: North Carolina → Savannah Georgia → Florida Panhandle → Orlando.

GAMEPLAY RULES:
- Narrate in second person — Donnie always present
- Donnie speaks frequently with complete confidence
- Keep responses to 3-5 sentences plus Donnie dialogue
- After EVERY response output exactly: ACTIONS:["action 1","action 2","action 3","action 4"]
- Also output which characters are present: PRESENT:["Donnie"]
- Bold and absurd choices enthusiastically encouraged`,
  }
};

// ═══════════════════════════════════════════
// GAME STATE
// ═══════════════════════════════════════════
let currentWorld = null;
let messageHistory = [];
let isWaiting = false;
let recognition = null;
let isListening = false;
let conversationMode = false;
let conversationCharacter = null;
let conversationHistory = [];

function saveState() {
  if (!currentWorld) return;
  const key = Object.keys(WORLDS).find(k => WORLDS[k] === currentWorld);
  localStorage.setItem(`ag_save_${key}`, JSON.stringify({
    key,
    history: messageHistory
  }));
}

function loadState(worldKey) {
  try {
    const saved = JSON.parse(localStorage.getItem(`ag_save_${worldKey}`));
    if (!saved || !saved.history || !saved.history.length) return false;
    return saved;
  } catch(e) { return false; }
}

function clearState(worldKey) {
  if (worldKey) {
    localStorage.removeItem(`ag_save_${worldKey}`);
  } else {
    Object.keys(WORLDS).forEach(k => localStorage.removeItem(`ag_save_${k}`));
  }
}

function hasSave(worldKey) {
  try {
    const saved = JSON.parse(localStorage.getItem(`ag_save_${worldKey}`));
    return !!(saved && saved.history && saved.history.length > 0);
  } catch(e) { return false; }
}

// ═══════════════════════════════════════════
// WORLD SELECTION
// ═══════════════════════════════════════════
async function startWorld(worldKey) {
  const saved = loadState(worldKey);

  if (saved) {
    // Ask to resume or start fresh
    currentWorld = WORLDS[worldKey];
    messageHistory = saved.history;
    showResumePrompt(worldKey);
    return;
  }

  launchWorld(worldKey);
}

function showResumePrompt(worldKey) {
  const world = WORLDS[worldKey];
  document.getElementById('title-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'flex';
  document.getElementById('world-title').textContent = world.title;
  document.getElementById('story-feed').innerHTML = '';
  document.getElementById('action-buttons').innerHTML = '';

  const feed = document.getElementById('story-feed');
  const prompt = document.createElement('div');
  prompt.style.cssText = `
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 16px;
    padding: 24px;
  `;
  prompt.innerHTML = `
    <div style="color:#888; font-size:0.9rem; text-align:center; font-style:italic;">
      You have a saved game in progress...
    </div>
    <div style="display:flex; gap:12px; flex-wrap:wrap; justify-content:center;">
      <button onclick="resumeWorld('${worldKey}')" style="
        background:#e8c84a; border:none; color:#0a0a0a;
        padding:10px 24px; border-radius:6px; cursor:pointer;
        font-family:Georgia,serif; font-size:0.95rem; font-weight:bold;">
        Resume Game
      </button>
      <button onclick="newGame('${worldKey}')" style="
        background:none; border:1px solid #444; color:#888;
        padding:10px 24px; border-radius:6px; cursor:pointer;
        font-family:Georgia,serif; font-size:0.95rem;">
        New Game
      </button>
      <button onclick="goBack()" style="
        background:none; border:1px solid #333; color:#666;
        padding:10px 24px; border-radius:6px; cursor:pointer;
        font-family:Georgia,serif; font-size:0.85rem;">
        ← Back
      </button>
    </div>
  `;
  feed.appendChild(prompt);

  const img = document.getElementById('scene-image');
  img.src = currentWorld.image;
  img.onerror = () => img.style.display = 'none';
}

function resumeWorld(worldKey) {
  document.getElementById('story-feed').innerHTML = '';
  const feed = document.getElementById('story-feed');

  for (const msg of messageHistory) {
    if (msg.role === 'user') {
      addToFeed(msg.content, 'player');
    } else {
      const narrative = msg.content
        .replace(/ACTIONS:\[.+?\]/s, '')
        .replace(/PRESENT:\[.+?\]/s, '')
        .trim();
      addToFeed(narrative, 'narrator');
    }
  }

  const lastAssistant = [...messageHistory].reverse().find(m => m.role === 'assistant');
  if (lastAssistant) {
    const actionsLineMatch = lastAssistant.content.match(/ACTIONS:\s*\[([^\]]+)\]/);
    const presentLineMatch = lastAssistant.content.match(/PRESENT:\s*\[([^\]]+)\]/);
    let actions = [];
    let present = [];
    if (actionsLineMatch) {
      const items = actionsLineMatch[1].match(/"([^"]+)"/g);
      if (items) actions = items.map(a => a.replace(/"/g, ''));
    }
    if (presentLineMatch) {
      const items = presentLineMatch[1].match(/"([^"]+)"/g);
      if (items) present = items.map(p => p.replace(/"/g, ''));
    }
    renderButtons(actions, present);
  }

  feed.scrollTop = feed.scrollHeight;
}

function newGame(worldKey) {
  clearState(worldKey);
  messageHistory = [];
  launchWorld(worldKey);
}

async function launchWorld(worldKey) {
  currentWorld = WORLDS[worldKey];
  messageHistory = [];
  conversationMode = false;
  conversationCharacter = null;
  conversationHistory = [];

  document.getElementById('title-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'flex';
  document.getElementById('world-title').textContent = currentWorld.title;
  document.getElementById('story-feed').innerHTML = '';
  document.getElementById('action-buttons').innerHTML = '';
  exitConversationUI();

  const img = document.getElementById('scene-image');
  img.src = currentWorld.image;
  img.style.display = 'block';
  img.onerror = () => img.style.display = 'none';

  await sendToAI("Begin the adventure. Set the scene vividly and immediately. Drop me right into the action.");
}

function goBack() {
  currentWorld = null;
  messageHistory = [];
  conversationMode = false;
  conversationCharacter = null;
  conversationHistory = [];
  document.getElementById('game-screen').style.display = 'none';
  document.getElementById('title-screen').style.display = 'flex';
  exitConversationUI();
  stopVoice();
  updateWorldCards();
}

// ═══════════════════════════════════════════
// SEND ACTION
// ═══════════════════════════════════════════
async function sendAction(actionText) {
  if (isWaiting) return;
  const input = document.getElementById('player-input');
  const text = actionText || input.value.trim();
  if (!text) return;
  input.value = '';

  if (conversationMode) {
    await sendConversation(text);
  } else {
    document.getElementById('action-buttons').innerHTML = '';
    addToFeed(text, 'player');
    await sendToAI(text);
  }
}

// ═══════════════════════════════════════════
// MAIN NARRATIVE AI
// ═══════════════════════════════════════════
async function sendToAI(playerAction) {
  isWaiting = true;
  document.getElementById('send-btn').disabled = true;

  messageHistory.push({ role: 'user', content: playerAction });
  const typingEl = addToFeed('...', 'typing');

  try {
    const response = await fetch('/api/turn', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        systemPrompt: currentWorld.system,
        messages: messageHistory
      })
    });

    const data = await response.json();
    const fullText = data.content[0].text;

    // Parse actions
   // Find ACTIONS line
    const actionsLineMatch = fullText.match(/ACTIONS:\s*\[([^\]]+)\]/);
    const presentLineMatch = fullText.match(/PRESENT:\s*\[([^\]]+)\]/);

    // Strip everything after and including ACTIONS: from narrative
    let narrative = fullText;
    const actionsIndex = fullText.indexOf('ACTIONS:');
    if (actionsIndex !== -1) {
      narrative = fullText.substring(0, actionsIndex);
    }

    // Clean markdown
    narrative = narrative
      .replace(/#{1,6}\s+/g, '')
      .replace(/\*\*(.+?)\*\*/g, '$1')
      .replace(/\*(.+?)\*/g, '$1')
      .trim();

    // Parse actions
    let actions = [];
    if (actionsLineMatch) {
      const actionsStr = actionsLineMatch[1];
      const actionItems = actionsStr.match(/"([^"]+)"/g);
      if (actionItems) {
        actions = actionItems.map(a => a.replace(/"/g, ''));
      }
    }

    // Parse present characters
    let presentChars = [];
    if (presentLineMatch) {
      const presentStr = presentLineMatch[1];
      const presentItems = presentStr.match(/"([^"]+)"/g);
      if (presentItems) {
        presentChars = presentItems.map(p => p.replace(/"/g, ''));
      }
    }

    

    typingEl.remove();
    addToFeed(narrative, 'narrator');
    messageHistory.push({ role: 'assistant', content: fullText });
    saveState();

    renderButtons(actions, presentChars);

  } catch(err) {
    typingEl.remove();
    addToFeed('Something went wrong. Try again.', 'narrator');
    console.error(err);
  }

  isWaiting = false;
  document.getElementById('send-btn').disabled = false;
}

// ═══════════════════════════════════════════
// CHARACTER CONVERSATION MODE
// ═══════════════════════════════════════════
function sitDownWith(characterName) {
  conversationMode = true;
  conversationCharacter = characterName;
  conversationHistory = [];

  // Visual shift
  const inputArea = document.getElementById('input-area');
  const input = document.getElementById('player-input');
  const sendBtn = document.getElementById('send-btn');
  inputArea.classList.add('convo-mode');
  input.classList.add('convo-mode');
  sendBtn.classList.add('convo-mode');
  input.placeholder = `Say something to ${characterName}...`;

  // Add conversation banner to feed
  const feed = document.getElementById('story-feed');
  const banner = document.createElement('div');
  banner.className = 'convo-banner';
  banner.id = 'convo-banner';
  banner.innerHTML = `
    <span>💬 Conversation with <strong>${characterName}</strong> — story paused</span>
    <button class="end-convo-btn" onclick="endConversation()">Back to story →</button>
  `;
  feed.appendChild(banner);
  feed.scrollTop = feed.scrollHeight;

  // Clear action buttons
  document.getElementById('action-buttons').innerHTML = '';

  // Opening line from character
  sendCharacterOpener(characterName);
}

async function sendCharacterOpener(characterName) {
  isWaiting = true;
  document.getElementById('send-btn').disabled = true;

  const profile = currentWorld.characterProfiles[characterName];
  const context = messageHistory.slice(-4).map(m => {
    if (m.role === 'assistant') {
      return m.content.replace(/ACTIONS:\[.+?\]/, '').replace(/PRESENT:\[.+?\]/, '').trim();
    }
    return m.content;
  }).join('\n');

  const systemPrompt = `${profile}

The player wants to sit down and have a direct conversation with you. The main story is paused. Stay completely in character. React naturally to what the player says. Be yourself fully — your personality, your secrets (reveal carefully as appropriate), your worldview. The recent story context is: ${context}

Respond only as ${characterName} speaking directly. No narrator voice. No action buttons. Pure character dialogue. Keep responses conversational — 2-4 sentences unless the moment calls for more.`;

  const typingEl = addToFeed('...', 'typing');

  try {
    const response = await fetch('/api/turn', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        systemPrompt,
        messages: [{ role: 'user', content: `The player has sat down with you. Open the conversation naturally — say something that fits who you are and the current moment.` }]
      })
    });

    const data = await response.json();
    const text = data.content[0].text;
    conversationHistory.push({ role: 'assistant', content: text });
    typingEl.remove();
    addToFeed(text, 'character');

  } catch(err) {
    typingEl.remove();
    addToFeed(`${characterName} looks at you.`, 'character');
  }

  isWaiting = false;
  document.getElementById('send-btn').disabled = false;
}

async function sendConversation(playerText) {
  isWaiting = true;
  document.getElementById('send-btn').disabled = true;

  addToFeed(playerText, 'player');
  conversationHistory.push({ role: 'user', content: playerText });

  // Check if player wants to end conversation
  const endPhrases = ['back to the story', 'back to story', 'end conversation', 'goodbye', 'farewell', 'i should go', 'let\'s go', 'enough talk'];
  if (endPhrases.some(p => playerText.toLowerCase().includes(p))) {
    endConversation();
    return;
  }

  const profile = currentWorld.characterProfiles[conversationCharacter];
  const context = messageHistory.slice(-4).map(m => {
    if (m.role === 'assistant') {
      return m.content.replace(/ACTIONS:\[.+?\]/, '').replace(/PRESENT:\[.+?\]/, '').trim();
    }
    return m.content;
  }).join('\n');

  const systemPrompt = `${profile}

You are in direct conversation with the player. Stay completely in character. The story context is: ${context}

Respond only as ${conversationCharacter} speaking directly. No narrator voice. No action buttons. Pure dialogue. 2-4 sentences unless the moment calls for more.`;

  const typingEl = addToFeed('...', 'typing');

  try {
    const response = await fetch('/api/turn', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        systemPrompt,
        messages: conversationHistory
      })
    });

    const data = await response.json();
    const text = data.content[0].text;
    conversationHistory.push({ role: 'assistant', content: text });
    typingEl.remove();
    addToFeed(text, 'character');

  } catch(err) {
    typingEl.remove();
    addToFeed('...', 'character');
  }

  isWaiting = false;
  document.getElementById('send-btn').disabled = false;
}

function endConversation() {
  conversationMode = false;
  conversationCharacter = null;
  conversationHistory = [];
  exitConversationUI();

  // Return to story note
  addToFeed('You return to the story...', 'narrator');

  // Restore last action buttons
  const lastAssistant = [...messageHistory].reverse().find(m => m.role === 'assistant');
  if (lastAssistant) {
    const actionMatch = lastAssistant.content.match(/ACTIONS:\[(.+?)\]/);
    const presentMatch = lastAssistant.content.match(/PRESENT:\[(.+?)\]/);
    let actions = [];
    let present = [];
    if (actionMatch) { try { actions = JSON.parse('[' + actionMatch[1] + ']'); } catch(e) {} }
    if (presentMatch) { try { present = JSON.parse('[' + presentMatch[1] + ']'); } catch(e) {} }
    renderButtons(actions, present);
  }
}

function exitConversationUI() {
  conversationMode = false;
  const inputArea = document.getElementById('input-area');
  const input = document.getElementById('player-input');
  const sendBtn = document.getElementById('send-btn');
  if (inputArea) inputArea.classList.remove('convo-mode');
  if (input) {
    input.classList.remove('convo-mode');
    input.placeholder = 'What do you do...';
  }
  if (sendBtn) sendBtn.classList.remove('convo-mode');
  const banner = document.getElementById('convo-banner');
  if (banner) banner.remove();
}

// ═══════════════════════════════════════════
// RENDER BUTTONS
// ═══════════════════════════════════════════
function renderButtons(actions, presentChars) {
  const container = document.getElementById('action-buttons');
  container.innerHTML = '';

  // Action buttons
  actions.forEach(action => {
    const btn = document.createElement('button');
    btn.className = 'action-btn';
    btn.textContent = action;
    btn.onclick = () => sendAction(action);
    container.appendChild(btn);
  });

  // Filter present characters to those with profiles
  const sittable = (presentChars || []).filter(name =>
    currentWorld.characterProfiles && currentWorld.characterProfiles[name]
  );

  if (sittable.length > 0) {
    const divider = document.createElement('div');
    divider.className = 'btn-divider';
    container.appendChild(divider);

    sittable.forEach(name => {
      const btn = document.createElement('button');
      btn.className = 'sit-btn';
      btn.textContent = `Sit down with ${name}`;
      btn.onclick = () => sitDownWith(name);
      container.appendChild(btn);
    });
  }
}

// ═══════════════════════════════════════════
// UI HELPERS
// ═══════════════════════════════════════════
function addToFeed(text, type) {
  const feed = document.getElementById('story-feed');
  const el = document.createElement('div');
  el.className = `story-entry ${type}-text`;

  if (type === 'narrator' || type === 'character') {
    el.textContent = '';
    feed.appendChild(el);

    // Hide buttons while typing
    const actionButtons = document.getElementById('action-buttons');
    actionButtons.classList.add('hidden');

    let i = 0;
    const speed = type === 'character' ? 22 : 18;
    const timer = setInterval(() => {
      el.textContent += text[i];
      i++;
      feed.scrollTop = feed.scrollHeight;
      if (i >= text.length) {
        clearInterval(timer);
        // Reveal buttons after typing done
        actionButtons.classList.remove('hidden');
        feed.scrollTop = feed.scrollHeight;
      }
    }, speed);
  } else {
    el.textContent = type === 'player' ? `> ${text}` : text;
    feed.appendChild(el);
  }

  feed.scrollTop = feed.scrollHeight;
  return el;
}

// ═══════════════════════════════════════════
// VOICE INPUT
// ═══════════════════════════════════════════
function setupVoice() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    document.getElementById('voice-btn').style.display = 'none';
    return;
  }
  recognition = new SpeechRecognition();
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.lang = 'en-US';
  recognition.onresult = (e) => {
    const transcript = e.results[0][0].transcript;
    document.getElementById('player-input').value = transcript;
    stopVoice();
    sendAction(transcript);
  };
  recognition.onend = () => stopVoice();
  recognition.onerror = () => stopVoice();
}

function toggleVoice() {
  isListening ? stopVoice() : startVoice();
}

function startVoice() {
  if (!recognition) return;
  recognition.start();
  isListening = true;
  document.getElementById('voice-btn').classList.add('active');
  document.getElementById('voice-btn').textContent = '⏹';
}

function stopVoice() {
  if (recognition && isListening) recognition.stop();
  isListening = false;
  const btn = document.getElementById('voice-btn');
  if (btn) { btn.classList.remove('active'); btn.textContent = '🎤'; }
}

// ═══════════════════════════════════════════
// EVENT LISTENERS
// ═══════════════════════════════════════════
document.getElementById('player-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendAction();
  }
});

document.getElementById('voice-btn').addEventListener('click', toggleVoice);

// ═══════════════════════════════════════════
// WORLD CARD INDICATORS
// ═══════════════════════════════════════════
function updateWorldCards() {
  Object.keys(WORLDS).forEach(key => {
    const indicator = document.getElementById(`save-${key}`);
    const card = document.getElementById(`card-${key}`);
    if (!indicator || !card) return;
    if (hasSave(key)) {
      indicator.textContent = '● In Progress';
      card.classList.add('has-save');
    } else {
      indicator.textContent = '';
      card.classList.remove('has-save');
    }
  });
}

function resumeGame() {
  if (window._resumeBar) window._resumeBar.remove();
}

function dismissResume() {
  if (window._resumeBar) window._resumeBar.remove();
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
setupVoice();
updateWorldCards();




</script>
